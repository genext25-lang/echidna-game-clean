<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Echidna Naklz</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #0a0a1a; --card: #1a1a2e; --primary: #6366f1; --success: #10b981; --error: #ef4444; --gold: #fbbf24; --text: #f8fafc; --sec: #94a3b8; --border: #334155; }
        * { box-sizing: border-box; }
        html, body { height: 100%; width: 100%; margin: 0; padding: 0; overflow: hidden; background: var(--bg); color: var(--text); font-family: system-ui, -apple-system, sans-serif; }
        .container { width: 100%; max-width: 480px; margin: 0 auto; padding: 15px; padding-bottom: 100px; box-sizing: border-box; height: 100%; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .balance-mini { background: rgba(26,26,46,0.7); backdrop-filter: blur(10px); border-radius: 40px; padding: 8px 16px; border: 1px solid rgba(255,255,255,0.1); display: inline-flex; align-items: center; gap: 8px; }
        .balance-mini-icon { width: 28px; height: 28px; }
        .balance-mini-icon img { width: 100%; height: 100%; object-fit: contain; }
        .balance-mini-amount { font-size: 20px; font-weight: 700; color: var(--gold); }
        .hero-echidna { width: 100%; max-width: 300px; margin: 0 auto 20px; text-align: center; }
        .hero-echidna img { width: 100%; height: auto; display: block; }
        .stats-panel { display: flex; gap: 12px; margin-bottom: 20px; background: rgba(26,26,46,0.7); backdrop-filter: blur(10px); border-radius: 20px; padding: 16px; border: 1px solid rgba(255,255,255,0.1); }
        .stat-item { flex: 1; text-align: center; }
        .stat-value { font-size: 24px; font-weight: 800; color: var(--primary); }
        .stat-label { font-size: 11px; color: var(--sec); text-transform: uppercase; margin-top: 4px; }
        .btn-create, .btn-open-rooms { width: 100%; padding: 18px; font-size: 18px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; border: none; border-radius: 16px; color: #fff; cursor: pointer; margin-bottom: 16px; display: flex; align-items: center; justify-content: center; gap: 10px; transition: all 0.3s ease; }
        .btn-create { background: linear-gradient(135deg, rgba(16,185,129,0.9), rgba(5,150,105,0.9)); border: 1px solid rgba(255,255,255,0.2); }
        .btn-open-rooms { background: rgba(99,102,241,0.2); border: 1px solid rgba(99,102,241,0.5); color: var(--primary); font-size: 16px; font-weight: 700; text-transform: none; }
        .rooms-screen { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(10,10,26,0.95); backdrop-filter: blur(20px); z-index: 200; padding: 15px; padding-bottom: 90px; overflow-y: auto; transform: translateX(100%); transition: transform 0.3s ease-out; }
        .rooms-screen.open { transform: translateX(0); }
        .rooms-header { display: flex; align-items: center; gap: 16px; margin-bottom: 20px; }
        .back-btn { background: rgba(26,26,46,0.7); border: 1px solid rgba(255,255,255,0.1); border-radius: 40px; padding: 10px 16px; color: var(--text); font-size: 14px; cursor: pointer; display: flex; align-items: center; gap: 6px; }
        .rooms-title { font-size: 20px; font-weight: 700; }
        .section-title { font-size: 13px; color: var(--sec); margin: 18px 0 8px; text-transform: uppercase; }
        .room-card { background: rgba(26,26,46,0.7); backdrop-filter: blur(10px); border-radius: 14px; margin-bottom: 8px; padding: 14px; display: flex; align-items: center; gap: 12px; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; transition: all 0.2s; }
        .room-card.my-room { border-left: 3px solid var(--success); }
        .room-icon { width: 50px; height: 50px; border-radius: 12px; overflow: hidden; flex-shrink: 0; background: rgba(10,10,26,0.5); display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 700; color: var(--sec); }
        .room-icon img { width: 100%; height: 100%; object-fit: cover; }
        .room-info { flex: 1; min-width: 0; }
        .room-stake { font-weight: 700; color: var(--gold); font-size: 13px; }
        .room-creator { font-size: 11px; color: var(--sec); }
        .room-actions { display: flex; gap: 6px; flex-shrink: 0; }
        .room-btn { padding: 6px 12px; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; font-size: 11px; white-space: nowrap; }
        .room-btn.join { background: linear-gradient(135deg, #6366f1, #4f46e5); color: #fff; }
        .room-btn.cancel { background: linear-gradient(135deg, #ef4444, #dc2626); color: #fff; }
        .player-wrapper { display: flex; flex-direction: column; align-items: center; width: 90px; }
        .player-avatar { width: 85px; height: 85px; border-radius: 50%; overflow: hidden; border: 3px solid rgba(255,255,255,0.1); background: rgba(26,26,46,0.7); display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: 700; color: var(--sec); }
        .player-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .player-stats-small { font-size: 13px; margin-top: 10px; padding: 5px 10px; background: rgba(26,26,46,0.9); border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); text-align: center; min-width: 60px; }
        .game-players { display: flex; justify-content: space-around; align-items: flex-start; margin: 15px 0; }
        .game-stakes { background: rgba(251,191,36,0.05); border-radius: 12px; padding: 12px; margin: 10px 0; text-align: center; border: 1px solid rgba(255,255,255,0.1); }
        .stake-line { font-size: 14px; font-weight: 600; margin: 4px 0; display: flex; justify-content: space-between; padding: 0 10px; }
        .stake-value { color: var(--gold); }
        .stake-win { color: var(--success); font-size: 16px; }
        .choices { display: flex; justify-content: space-between; gap: 12px; margin: 20px 0; width: 100%; }
        .choice-btn { flex: 1; height: 150px; border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; background: rgba(26,26,46,0.7); cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px; transition: all 0.2s; }
        .choice-btn:active:not(:disabled) { transform: scale(0.96); }
        .choice-btn img { width: 85px; height: 85px; object-fit: contain; margin-bottom: 10px; }
        .choice-btn span { font-size: 13px; color: var(--gold); font-weight: 800; text-transform: uppercase; }
        .choice-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .status-box { background: rgba(26,26,46,0.7); border-radius: 14px; padding: 16px; text-align: center; margin: 15px 0; border: 1px solid rgba(255,255,255,0.1); }
        .hidden { display: none !important; }
        .loader { text-align: center; padding: 30px; color: var(--sec); }
        .spinner { border: 3px solid rgba(51,65,85,0.3); border-top-color: var(--primary); border-radius: 50%; width: 28px; height: 28px; animation: spin 0.8s linear infinite; margin: 0 auto 10px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; height: 70px; background: rgba(26,26,46,0.9); backdrop-filter: blur(20px); border-top: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: space-around; z-index: 10000; padding: 0 10px; }
        .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; background: none; border: none; color: var(--sec); font-size: 10px; cursor: pointer; padding: 5px 0; }
        .nav-btn.active { color: var(--primary); }
        .nav-btn svg { width: 28px; height: 28px; }
        .splash-screen { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: var(--bg); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .splash-screen.hidden { display: none !important; }
        .splash-title { margin-bottom: 16px; font-size: 32px; font-weight: 700; background: linear-gradient(135deg, #818cf8, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-align: center; }
        .splash-banner { width: 100%; max-width: 420px; border-radius: 16px; overflow: hidden; }
        .splash-banner img { width: 100%; height: auto; display: block; }
        .splash-btn { width: 100%; padding: 16px; font-size: 18px; font-weight: 700; background: linear-gradient(135deg, rgba(16,185,129,0.9), rgba(5,150,105,0.9)); border: 1px solid rgba(255,255,255,0.2); border-radius: 16px; color: #fff; cursor: pointer; margin-top: 16px; }
        .stake-modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(20px); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .stake-modal.hidden { display: none; }
        .stake-modal-content { background: rgba(26,26,46,0.95); border-radius: 20px; padding: 24px; max-width: 360px; width: 100%; border: 1px solid rgba(255,255,255,0.2); }
        .stake-modal-title { font-size: 20px; font-weight: 700; text-align: center; margin-bottom: 16px; }
        .stake-presets { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 16px; }
        .stake-preset-btn { padding: 12px 6px; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; background: rgba(10,10,26,0.7); color: var(--text); font-size: 13px; font-weight: 600; cursor: pointer; text-align: center; }
        .stake-preset-btn.selected { border-color: var(--gold); background: rgba(251,191,36,0.15); color: var(--gold); }
        .stake-input { width: 100%; padding: 12px; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; background: rgba(10,10,26,0.7); color: var(--text); font-size: 16px; text-align: center; outline: none; box-sizing: border-box; }
        .stake-confirm-btn { background: linear-gradient(135deg, #10b981, #059669); width: 100%; padding: 14px; border: none; border-radius: 14px; font-size: 16px; font-weight: 700; color: #fff; cursor: pointer; margin-top: 12px; }
    </style>
</head>
<body>
    <div id="splashScreen" class="splash-screen">
        <div class="splash-title">Echidna Naklz</div>
        <div class="splash-banner"><img src="https://raw.githubusercontent.com/genext25-lang/ekhidna-bot-V2.0/refs/heads/main/echidna-banner.png" alt="Echidna Naklz"></div>
        <div style="color:var(--sec);margin:16px 0;text-align:center;">Камень • Ножницы • Бумага<br>Ставки от 10 до 1000 Spike</div>
        <button class="splash-btn" id="startGameBtn">🎮 ИГРАТЬ</button>
    </div>
    <div class="container">
        <div id="lobbyScreen">
            <div class="top-bar">
                <div class="balance-mini"><div class="balance-mini-icon"><img src="https://raw.githubusercontent.com/genext25-lang/ekhidna-bot-V2.0/refs/heads/main/spike-coin.png" alt="Spike"></div><span class="balance-mini-amount" id="balanceSpike">0</span></div>
            </div>
            <div class="hero-echidna"><img src="https://raw.githubusercontent.com/genext25-lang/ekhidna-bot-V2.0/refs/heads/main/skin-default.png" alt="Echidna" id="heroEchidnaImg"></div>
            <div class="stats-panel">
                <div class="stat-item"><div class="stat-value" id="statWins">0</div><div class="stat-label">Побед</div></div>
                <div class="stat-item"><div class="stat-value" id="statGames">0</div><div class="stat-label">Игр</div></div>
            </div>
            <button class="btn-create" onclick="openStakeModal()">🚪 СОЗДАТЬ КОМНАТУ</button>
            <button class="btn-open-rooms" onclick="openRoomsScreen()">📋 ОТКРЫТЫЕ КОМНАТЫ</button>
        </div>
        <div id="roomsScreen" class="rooms-screen">
            <div class="rooms-header"><button class="back-btn" onclick="closeRoomsScreen()">← Назад</button><div class="rooms-title">Комнаты</div></div>
            <div class="section-title">Мои комнаты</div>
            <div id="myRoomsList"><div class="loader"><div class="spinner"></div></div></div>
            <div class="section-title">Доступные комнаты</div>
            <div id="roomsList"><div class="loader"><div class="spinner"></div></div></div>
        </div>
        <div id="gameScreen" class="hidden">
            <div style="text-align:center;margin-bottom:20px;"><h2 style="color:var(--primary);">⚔️ Битва!</h2></div>
            <div class="game-players">
                <div class="player-wrapper"><div class="player-avatar" id="playerAvatar"></div><div class="player-stats-small" id="playerStats"></div></div>
                <div style="font-size:24px;color:var(--error);align-self:center;">VS</div>
                <div class="player-wrapper"><div class="player-avatar" id="opponentAvatar"></div><div class="player-stats-small" id="opponentStats"></div></div>
            </div>
            <div class="game-stakes"><div class="stake-line">💰 Ставка: <span id="stakeAmount" class="stake-value">10</span> Spike</div><div class="stake-line">🏆 Победитель получит: <span id="winAmount" class="stake-win">20</span> Spike</div></div>
            <div class="status-box"><div id="statusMessage">Выберите ход</div></div>
            <div class="choices">
                <button class="choice-btn" onclick="makeMove('rock')"><img src="move-rock.png" alt="Камень"><span>Камень</span></button>
                <button class="choice-btn" onclick="makeMove('scissors')"><img src="move-scissors.png" alt="Ножницы"><span>Ножницы</span></button>
                <button class="choice-btn" onclick="makeMove('paper')"><img src="move-paper.png" alt="Бумага"><span>Бумага</span></button>
            </div>
        </div>
    </div>
    <div id="stakeModal" class="stake-modal hidden" onclick="closeStakeModal(event)"><div class="stake-modal-content" onclick="event.stopPropagation()"><div class="stake-modal-title">🦔 Выбери ставку Spike</div><div class="stake-presets"><button class="stake-preset-btn selected" data-stake="10" onclick="selectStakePreset(10,this)">10</button><button class="stake-preset-btn" data-stake="50" onclick="selectStakePreset(50,this)">50</button><button class="stake-preset-btn" data-stake="100" onclick="selectStakePreset(100,this)">100</button><button class="stake-preset-btn" data-stake="200" onclick="selectStakePreset(200,this)">200</button><button class="stake-preset-btn" data-stake="500" onclick="selectStakePreset(500,this)">500</button><button class="stake-preset-btn" data-stake="1000" onclick="selectStakePreset(1000,this)">1K</button></div><div style="text-align:center;margin-bottom:12px;"><input type="number" class="stake-input" id="stakeInput" placeholder="10 - 1000" min="10" max="1000" step="10" oninput="onStakeInput()"></div><button class="stake-confirm-btn" onclick="confirmStake()">Создать комнату</button></div></div>
    <div class="bottom-nav" id="bottomNav">
        <button class="nav-btn active" onclick="showScreen('lobby')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg><span>Лобби</span></button>
    </div>
    <script>
        // ========== КОНФИГУРАЦИЯ ==========
        var URL = 'https://tejndwtckdvueufqhitu.supabase.co';
        var ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRlam5kd3Rja2R2dWV1ZnFoaXR1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyMjY5MjcsImV4cCI6MjA5MzgwMjkyN30.tDP9B-nWPMsuANJ4JiASs0UYgJqJZtm9Sj3jUs13l9c';
        var moveImages = { rock: 'move-rock.png', scissors: 'move-scissors.png', paper: 'move-paper.png' };

        var user = null, MY_ID = null, currentBalance = 1000;
        var currentRoom = null, selectedStake = 10;
        var isCreatingRoom = false, isJoiningRoom = false, isProcessingGame = false;
        var activeIntervals = { pollInterval: null, lobbyRefreshInterval: null };

        function sleep(ms) { return new Promise(function(r) { setTimeout(r, ms); }); }
        function clearAllIntervals() { 
            if (activeIntervals.pollInterval) { clearInterval(activeIntervals.pollInterval); activeIntervals.pollInterval = null; } 
            if (activeIntervals.lobbyRefreshInterval) { clearInterval(activeIntervals.lobbyRefreshInterval); activeIntervals.lobbyRefreshInterval = null; } 
        }
        function formatCompactNumber(n) { if (n == null) return '0'; var a = Math.abs(n), s = n < 0 ? '-' : ''; if (a >= 1e6) return s + (a / 1e6).toFixed(1) + 'M'; if (a >= 1e3) return s + (a / 1e3).toFixed(1) + 'K'; return s + a; }

        async function db(table, method, payload, filters, single) {
            payload = payload || null; filters = filters || ''; single = single || false;
            var url = URL + '/rest/v1/' + table + '?' + filters;
            var headers = { 'apikey': ANON_KEY, 'Authorization': 'Bearer ' + ANON_KEY, 'Content-Type': 'application/json' };
            if (method === 'POST' || method === 'PATCH') headers['Prefer'] = 'return=representation';
            try {
                var resp = await fetch(url, { method: method, headers: headers, body: payload ? JSON.stringify(payload) : null });
                if (!resp.ok) { var txt = await resp.text(); throw new Error(resp.status + ': ' + txt); }
                if (method === 'DELETE') return true;
                var data = await resp.json();
                return single && Array.isArray(data) ? data[0] : data;
            } catch(e) { console.error('[DB]', e.message); throw e; }
        }

        function getUserFromTelegram() {
            var tg = window.Telegram?.WebApp;
            if (tg?.initDataUnsafe?.user) {
                user = tg.initDataUnsafe.user;
                MY_ID = Number(user.id);
                console.log('[AUTH] User:', user.username, 'ID:', MY_ID);
                return true;
            }
            return false;
        }

        async function ensureUser() {
            if (!MY_ID) return;
            try {
                var existing = await db('users', 'GET', null, 'telegram_id=eq.' + MY_ID + '&limit=1');
                if (!existing || existing.length === 0) {
                    await db('users', 'POST', [{ telegram_id: MY_ID, username: user.username || 'User', wins: 0, losses: 0, balance: 1000 }]);
                    currentBalance = 1000;
                } else {
                    currentBalance = existing[0].balance || 1000;
                }
                document.getElementById('balanceSpike').textContent = formatCompactNumber(currentBalance);
            } catch(e) {}
        }

        async function loadRooms() {
            if (!MY_ID) return;
            try {
                var my = await db('rooms', 'GET', null, 'creator_tg_id=eq.' + MY_ID + '&status=neq.finished&order=created_at.desc&limit=10');
                var all = await db('rooms', 'GET', null, 'status=neq.finished&order=created_at.desc&limit=50');
                renderRooms('myRoomsList', Array.isArray(my) ? my : [], true);
                renderRooms('roomsList', (Array.isArray(all) ? all : []).filter(function(r) { return Number(r.creator_tg_id) !== MY_ID; }), false);
            } catch(e) {}
        }

        function renderRooms(id, rooms, isMy) {
            var c = document.getElementById(id); if (!c) return; c.innerHTML = '';
            if (!rooms || rooms.length === 0) { c.innerHTML = '<div style="padding:20px;color:var(--sec);text-align:center;">Нет комнат</div>'; return; }
            rooms.forEach(function(r) {
                var mine = Number(r.creator_tg_id) === MY_ID;
                var opponent = Number(r.opponent_tg_id) === MY_ID;
                var el = document.createElement('div');
                el.className = 'room-card' + (mine ? ' my-room' : '');
                if (mine || opponent) { el.onclick = function() { resumeRoom(r.id); }; el.style.cursor = 'pointer'; }
                var btnHtml = '';
                if (mine) {
                    if (r.status === 'playing') btnHtml = '<button class="room-btn join" onclick="event.stopPropagation();resumeRoom(\'' + r.id + '\')">🔄</button>';
                    if (!r.opponent_tg_id && r.status !== 'playing') btnHtml += '<button class="room-btn cancel" onclick="event.stopPropagation();cancelRoom(\'' + r.id + '\')">✕</button>';
                } else if (r.status === 'waiting') {
                    btnHtml = '<button class="room-btn join" onclick="event.stopPropagation();joinRoom(\'' + r.id + '\',this)">Войти</button>';
                }
                el.innerHTML = '<div class="room-icon">' + (r.creator_username || '?').charAt(0).toUpperCase() + '</div><div class="room-info"><div class="room-stake">💰 ' + (r.stake || 0) + ' Spike</div><div class="room-creator">' + (mine ? 'Твоя комната' : '@' + (r.creator_username || '?')) + '</div></div><div class="room-actions">' + btnHtml + '</div>';
                c.appendChild(el);
            });
        }

        async function resumeRoom(roomId) {
            try {
                var room = await db('rooms', 'GET', null, 'id=eq.' + roomId, true);
                if (!room) { alert('Комната не найдена'); loadRooms(); return; }
                currentRoom = room;
                showGameScreen();
                startPolling();
            } catch(e) { alert('Ошибка: ' + e.message); }
        }

        async function cancelRoom(roomId) { await db('rooms', 'DELETE', null, 'id=eq.' + roomId); loadRooms(); }

        async function joinRoom(roomId, btnElement) {
            if (isJoiningRoom) return;
            isJoiningRoom = true;
            if (btnElement) { btnElement.disabled = true; btnElement.textContent = '...'; }
            try {
                var roomData = await db('rooms', 'GET', null, 'id=eq.' + roomId, false);
                if (!roomData || !roomData.length) throw new Error('Комната не найдена');
                var room = roomData[0];
                if (Number(room.creator_tg_id) === MY_ID) { isJoiningRoom = false; resumeRoom(roomId); return; }
                if (room.opponent_tg_id && Number(room.opponent_tg_id) === MY_ID) { isJoiningRoom = false; resumeRoom(roomId); return; }
                if (room.status !== 'waiting') throw new Error('Комната занята');
                
                var updated = await db('rooms', 'PATCH', 
                    { opponent_tg_id: MY_ID, opponent_username: user.username || 'User', status: 'playing' },
                    'id=eq.' + roomId + '&status=eq.waiting', true);
                if (!updated) throw new Error('Не удалось присоединиться');
                
                currentRoom = updated;
                showGameScreen();
                startPolling();
                loadRooms();
                closeRoomsScreen();
            } catch(e) { alert('Ошибка: ' + e.message); if (btnElement) { btnElement.disabled = false; btnElement.textContent = 'Войти'; } }
            finally { isJoiningRoom = false; }
        }

        function openStakeModal() { document.getElementById('stakeModal').classList.remove('hidden'); }
        function closeStakeModal(e) { if (!e || e.target.id === 'stakeModal') document.getElementById('stakeModal').classList.add('hidden'); }
        function selectStakePreset(value, btn) {
            selectedStake = value;
            document.querySelectorAll('.stake-preset-btn').forEach(function(b) { b.classList.remove('selected'); });
            if (btn) btn.classList.add('selected');
        }
        function onStakeInput() {
            var val = parseInt(document.getElementById('stakeInput').value);
            document.querySelectorAll('.stake-preset-btn').forEach(function(b) { b.classList.remove('selected'); });
            if (isNaN(val) || val < 10) selectedStake = 10;
            else if (val > 1000) selectedStake = 1000;
            else selectedStake = Math.round(val / 10) * 10;
        }
        async function confirmStake() {
            if (isCreatingRoom) return;
            isCreatingRoom = true;
            try {
                document.getElementById('stakeModal').classList.add('hidden');
                var room = await db('rooms', 'POST', [{ creator_tg_id: MY_ID, creator_username: user.username || 'User', stake: selectedStake, status: 'waiting' }], '', true);
                currentRoom = room;
                showGameScreen();
                startPolling();
                loadRooms();
            } catch(e) { alert('Ошибка: ' + e.message); }
            finally { isCreatingRoom = false; }
        }

        function showGameScreen() {
            document.getElementById('roomsScreen').classList.remove('open');
            document.getElementById('lobbyScreen').classList.add('hidden');
            document.getElementById('gameScreen').classList.remove('hidden');
            if (!currentRoom) { document.getElementById('statusMessage').textContent = '❌ Комната не найдена'; return; }
            document.getElementById('stakeAmount').textContent = (currentRoom.stake || 10) + ' Spike';
            document.getElementById('winAmount').textContent = ((currentRoom.stake || 10) * 2) + ' Spike';
            updateGameUI();
        }

        function updateGameUI() {
            if (!currentRoom) return;
            var isCreator = String(currentRoom.creator_tg_id) === String(MY_ID);
            var myCol = isCreator ? 'creator_choice' : 'opponent_choice';
            var oppCol = isCreator ? 'opponent_choice' : 'creator_choice';
            var choices = document.querySelectorAll('.choice-btn');
            
            document.getElementById('playerAvatar').innerHTML = (user?.username || '?').charAt(0).toUpperCase();
            document.getElementById('playerStats').innerHTML = '✅ 0<br>❌ 0';
            
            if (currentRoom.opponent_tg_id) {
                document.getElementById('opponentAvatar').innerHTML = (currentRoom.opponent_username || 'Игрок').charAt(0).toUpperCase();
                document.getElementById('opponentStats').innerHTML = '✅ 0<br>❌ 0';
            } else {
                document.getElementById('opponentAvatar').innerHTML = '?';
                document.getElementById('opponentStats').innerHTML = '⏳ Ожидание...';
            }
            
            var myMoveDone = !!currentRoom[myCol];
            var oppMoveDone = !!currentRoom[oppCol];
            
            if (myMoveDone && oppMoveDone) {
                choices.forEach(function(b) { b.disabled = true; });
                document.getElementById('statusMessage').textContent = '🎯 Определение победителя...';
                if (!isProcessingGame) { isProcessingGame = true; clearAllIntervals(); showResult(currentRoom); }
            } else if (myMoveDone) {
                choices.forEach(function(b) { b.disabled = true; });
                document.getElementById('statusMessage').textContent = '✅ Ход записан. Ожидание соперника...';
            } else if (currentRoom.status === 'playing') {
                choices.forEach(function(b) { b.disabled = false; });
                document.getElementById('statusMessage').textContent = '🎮 Выберите ход!';
            } else {
                choices.forEach(function(b) { b.disabled = true; });
                document.getElementById('statusMessage').textContent = '⏳ Ожидание соперника...';
            }
        }

        function startPolling() {
            clearAllIntervals();
            if (!currentRoom) return;
            activeIntervals.pollInterval = setInterval(async function() {
                if (!currentRoom || isProcessingGame) return;
                try {
                    var res = await db('rooms', 'GET', null, 'id=eq.' + currentRoom.id, false);
                    if (!res || !res.length) return;
                    var room = res[0];
                    currentRoom = room;
                    updateGameUI();
                } catch(e) {}
            }, 2000);
        }

        async function makeMove(choice) {
            if (!currentRoom) { alert('❌ Комната не найдена'); return; }
            
            // Получаем свежие данные
            try { var fresh = await db('rooms', 'GET', null, 'id=eq.' + currentRoom.id, true); if (fresh) currentRoom = fresh; } catch(e) {}
            
            var isCreator = String(currentRoom.creator_tg_id) === String(MY_ID);
            var myCol = isCreator ? 'creator_choice' : 'opponent_choice';
            
            if (currentRoom.status !== 'playing') { alert('⏳ Ожидание соперника...'); return; }
            if (currentRoom[myCol]) { alert('✅ Вы уже сделали ход!'); return; }
            
            document.querySelectorAll('.choice-btn').forEach(function(b) { b.disabled = true; });
            document.getElementById('statusMessage').textContent = '✅ Ход записан';
            
            try {
                var updateData = {}; updateData[myCol] = choice;
                var updated = await db('rooms', 'PATCH', updateData, 'id=eq.' + currentRoom.id, true);
                if (updated) currentRoom = updated;
                updateGameUI();
            } catch(e) { alert('Ошибка: ' + e.message); updateGameUI(); }
        }

        async function showResult(room) {
            var isCreator = String(room.creator_tg_id) === String(MY_ID);
            var myMove = isCreator ? room.creator_choice : room.opponent_choice;
            var oppMove = isCreator ? room.opponent_choice : room.creator_choice;
            var result = calculateWinner(room);
            var msg = result.msg + '<br>Вы: ' + moveName(myMove) + ' vs ' + moveName(oppMove);
            document.getElementById('statusMessage').innerHTML = msg;
            
            if (result.winnerId) {
                var loserId = result.winnerId == room.creator_tg_id ? room.opponent_tg_id : room.creator_tg_id;
                var stake = room.stake || 10;
                try {
                    await updateBalance(result.winnerId, stake);
                    await updateBalance(loserId, -stake);
                    await updateWins(result.winnerId);
                    await updateLosses(loserId);
                    await db('rooms', 'PATCH', { status: 'finished' }, 'id=eq.' + room.id);
                } catch(e) {}
            } else {
                try { await db('rooms', 'PATCH', { status: 'finished' }, 'id=eq.' + room.id); } catch(e) {}
            }
            await ensureUser();
            setTimeout(function() { showScreen('lobby'); }, 4000);
        }

        function moveName(m) { return m === 'rock' ? '🪨 Камень' : m === 'scissors' ? '✂️ Ножницы' : '📄 Бумага'; }

        function calculateWinner(room) {
            var c1 = room.creator_choice, c2 = room.opponent_choice;
            var id1 = room.creator_tg_id, id2 = room.opponent_tg_id;
            if (!c1 || !c2) return { msg: 'Ошибка', winnerId: null };
            if (c1 === c2) return { msg: '🤝 Ничья!', winnerId: null };
            var beats = { rock: 'scissors', scissors: 'paper', paper: 'rock' };
            var creatorWins = beats[c1] === c2;
            return { msg: (creatorWins ? (MY_ID == id1) : (MY_ID == id2)) ? '🏆 Победа!' : '😢 Поражение', winnerId: creatorWins ? id1 : id2 };
        }

        async function updateBalance(playerId, amount) {
            var u = await db('users', 'GET', null, 'telegram_id=eq.' + playerId + '&select=balance', true);
            var bal = u ? (u.balance || 1000) : 1000;
            await db('users', 'PATCH', { balance: bal + amount }, 'telegram_id=eq.' + playerId);
        }

        async function updateWins(playerId) {
            var u = await db('users', 'GET', null, 'telegram_id=eq.' + playerId + '&select=wins', true);
            await db('users', 'PATCH', { wins: (u?.wins || 0) + 1 }, 'telegram_id=eq.' + playerId);
        }

        async function updateLosses(playerId) {
            var u = await db('users', 'GET', null, 'telegram_id=eq.' + playerId + '&select=losses', true);
            await db('users', 'PATCH', { losses: (u?.losses || 0) + 1 }, 'telegram_id=eq.' + playerId);
        }

        function showScreen(name) {
            document.getElementById('lobbyScreen').classList.add('hidden');
            document.getElementById('gameScreen').classList.add('hidden');
            if (name === 'lobby') {
                document.getElementById('lobbyScreen').classList.remove('hidden');
                currentRoom = null; isProcessingGame = false;
                clearAllIntervals();
                activeIntervals.lobbyRefreshInterval = setInterval(loadRooms, 5000);
                ensureUser(); loadRooms();
            }
        }

        function openRoomsScreen() { document.getElementById('roomsScreen').classList.add('open'); loadRooms(); }
        function closeRoomsScreen() { document.getElementById('roomsScreen').classList.remove('open'); }

        function startGame() { document.getElementById('splashScreen').classList.add('hidden'); showScreen('lobby'); }

        document.getElementById('startGameBtn').addEventListener('click', startGame);

        window.addEventListener('load', async function() {
            console.log('[INIT] Starting...');
            if (!getUserFromTelegram()) return;
            await ensureUser();
            loadRooms();
            console.log('[INIT] Done. ID:', MY_ID, 'Balance:', currentBalance);
        });
    </script>
</body>
</html>

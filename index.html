<!DOCTYPE html>
<html lang="ru">

    <style>

        .timer-text { font-size: 14px; color: var(--error); font-weight: bold; margin-top: 6px; display: none; }

        .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; background: none; border: none; color: var(--sec); font-size: 10px; cursor: pointer; padding: 5px 0; transition: all 0.2s; }

        .splash-banner { width: 100%; max-width: 420px; margin: 0; border-radius: 16px; overflow: hidden; }

    <div id="splashScreen" class="splash-screen"><div class="splash-content"><div class="splash-title">Echidna Naklz</div><div class="splash-banner"><img src="https://raw.githubusercontent.com/genext25-lang/ekhidna-bot-V2.0/refs/heads/main/echidna-banner.png" alt="Echidna Naklz"></div><div class="splash-rules"><h3>📜 Как играть</h3><ul><li>Создай комнату или присоединись</li><li>Ставка от 10 до 1000 Spike</li><li>Камень, Ножницы или Бумага</li><li>Победитель забирает банк</li></ul></div><button class="splash-btn" id="startGameBtn">🎮 ИГРАТЬ</button></div></div>

        <div id="lobbyScreen"><div class="top-bar"><div class="balance-mini"><div class="balance-mini-icon"><img src="https://raw.githubusercontent.com/genext25-lang/ekhidna-bot-V2.0/refs/heads/main/spike-coin.png" alt="Spike"></div><span class="balance-mini-amount" id="balanceSpike">0</span></div><div class="lang-mini"><button class="lang-mini-btn active" onclick="setLanguage('ru')">RU</button><button class="lang-mini-btn" onclick="setLanguage('en')">EN</button></div></div><div class="hero-echidna"><img src="https://raw.githubusercontent.com/genext25-lang/ekhidna-bot-V2.0/refs/heads/main/skin-default.png" alt="Echidna" id="heroEchidnaImg"></div><div class="stats-panel"><div class="stat-item"><div class="stat-value" id="statWins">0</div><div class="stat-label">Побед</div></div><div class="stat-item"><div class="stat-value" id="statGames">0</div><div class="stat-label">Игр</div></div><div class="stat-item"><div class="stat-value" id="statSkinName">Обычная</div><div class="stat-label">Скин</div></div></div><button class="btn-create" onclick="openStakeModal()">🚪 СОЗДАТЬ КОМНАТУ</button><button class="btn-open-rooms" onclick="openRoomsScreen()">📋 ОТКРЫТЫЕ КОМНАТЫ</button></div>
        <div id="roomsScreen" class="rooms-screen"><div class="rooms-header"><button class="back-btn" onclick="closeRoomsScreen()">← Назад</button><div class="rooms-title">Комнаты</div></div><div class="section-title">Мои комнаты</div><div id="myRoomsList"><div class="loader"><div class="spinner"></div></div></div><div class="section-title">Доступные комнаты</div><div id="roomsList"><div class="loader"><div class="spinner"></div></div></div></div>
        <div id="gameScreen" class="hidden"><div class="header"><h2>⚔️ Битва!</h2></div><div class="game-players"><div class="player-wrapper"><div class="player-avatar" id="playerAvatar"></div><div class="player-stats-small" id="playerStats"></div></div><div class="thinking-echidna-wrapper"><div class="thinking-echidna"><img src="https://raw.githubusercontent.com/genext25-lang/ekhidna-bot-V2.0/refs/heads/main/echidna-thinking.png" alt="Thinking"></div></div><div class="player-wrapper"><div class="player-avatar" id="opponentAvatar"></div><div class="player-stats-small" id="opponentStats"></div></div></div><div class="game-stakes"><div class="stake-line">💰 Ставка: <span id="stakeAmount" class="stake-value">10</span> Spike</div></div><div class="status-box"><div id="statusMessage">Выберите ход</div></div><div class="choices"><button class="choice-btn" onclick="makeMove('rock')"><img src="move-rock.png" alt="Камень"><span>Камень</span></button><button class="choice-btn" onclick="makeMove('scissors')"><img src="move-scissors.png" alt="Ножницы"><span>Ножницы</span></button><button class="choice-btn" onclick="makeMove('paper')"><img src="move-paper.png" alt="Бумага"><span>Бумага</span></button></div></div>
    </div>
    <div id="stakeModal" class="stake-modal hidden" onclick="closeStakeModal(event)"><div class="stake-modal-content" onclick="event.stopPropagation()"><button class="skin-modal-close" onclick="closeStakeModal()">✕</button><div class="stake-modal-title">🦔 Выбери ставку Spike</div><div class="stake-presets"><button class="stake-preset-btn selected" data-stake="10" onclick="selectStakePreset(10,this)">10</button><button class="stake-preset-btn" data-stake="50" onclick="selectStakePreset(50,this)">50</button><button class="stake-preset-btn" data-stake="100" onclick="selectStakePreset(100,this)">100</button><button class="stake-preset-btn" data-stake="200" onclick="selectStakePreset(200,this)">200</button><button class="stake-preset-btn" data-stake="500" onclick="selectStakePreset(500,this)">500</button><button class="stake-preset-btn" data-stake="1000" onclick="selectStakePreset(1000,this)">1K</button></div><div class="stake-input-group"><span>Или введи:</span><input type="number" class="stake-input" id="stakeInput" placeholder="10 - 1000" min="10" max="1000" step="10" oninput="onStakeInput()"></div><div class="stake-error" id="stakeError"></div><button class="stake-confirm-btn" onclick="confirmStake()">Создать комнату</button></div></div>
    <div class="bottom-nav" id="bottomNav">
        <button class="nav-btn active" onclick="showScreen('lobby')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg><span>Лобби</span></button>
    </div>
    <script>
        var SUPABASE_URL = 'https://tejndwtckdvueufqhitu.supabase.co';
        var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRlam5kd3Rja2R2dWV1ZnFoaXR1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyMjY5MjcsImV4cCI6MjA5MzgwMjkyN30.tDP9B-nWPMsuANJ4JiASs0UYgJqJZtm9Sj3jUs13l9c';
        
        var user = null, MY_ID = null, currentBalance = 1000;
        var currentRoom = null, selectedStake = 10;
        var isCreatingRoom = false, isJoiningRoom = false;
        
        function sanitizeFilter(f) { if (!f) return ''; if (!f.startsWith('?')) throw new Error('Invalid'); return f; }
        
        async function db(table, method, payload, filters, single) {
            payload = payload || null; filters = filters || ''; single = single || false;
            var url = SUPABASE_URL + '/rest/v1/' + table + sanitizeFilter(filters);
            var headers = { 'apikey': SUPABASE_ANON_KEY, 'Authorization': 'Bearer ' + SUPABASE_ANON_KEY, 'Content-Type': 'application/json', 'Accept': 'application/json' };
            if (method === 'POST') headers['Prefer'] = 'return=representation';
            try {
                var resp = await fetch(url, { method: method, headers: headers, body: payload ? JSON.stringify(payload) : null });
                if (!resp.ok) throw new Error(await resp.text());
                if (method === 'DELETE') return true;
                var data = await resp.json();
                return single && Array.isArray(data) ? data[0] : data;
            } catch(e) { console.error(e); throw e; }
        }

        // Получаем пользователя из Telegram
        function getUserFromTelegram() {
            var tg = window.Telegram?.WebApp;
            if (tg?.initDataUnsafe?.user) {
                user = tg.initDataUnsafe.user;
                MY_ID = Number(user.id);
                return true;
            }
            return false;
        }

        // Упрощённое создание пользователя
        async function ensureUser() {
            if (!MY_ID) return;
            try {
                var existing = await db('users', 'GET', null, '?telegram_id=eq.' + MY_ID + '&limit=1');
                if (!existing || existing.length === 0) {
                    await db('users', 'POST', [{ telegram_id: MY_ID, username: user.username || 'User', wins: 0, losses: 0, balance: 1000 }]);
                    currentBalance = 1000;
                } else {
                    currentBalance = existing[0].balance || 1000;
                }
            } catch(e) {}
        }

        async function loadRooms() {
            if (!MY_ID) return;
            try {
                var my = await db('rooms', 'GET', null, '?creator_tg_id=eq.' + MY_ID + '&status=neq.finished&order=created_at.desc&limit=10');
                var all = await db('rooms', 'GET', null, '?status=neq.finished&order=created_at.desc&limit=50');
                renderRooms('myRoomsList', Array.isArray(my) ? my : [], true);
                renderRooms('roomsList', (Array.isArray(all) ? all : []).filter(function(r) { return Number(r.creator_tg_id) !== MY_ID; }), false);
            } catch(e) {}
        }

        function renderRooms(id, rooms, isMy) {
            var c = document.getElementById(id); if (!c) return; c.innerHTML = '';
            if (!rooms || rooms.length === 0) { c.innerHTML = '<div style="padding:20px;color:var(--sec);text-align:center;">Нет комнат</div>'; return; }
            rooms.forEach(function(r) {
                var mine = Number(r.creator_tg_id) === MY_ID;
                var opponent = Number(r.opponent_tg_id) === MY_ID;
                var el = document.createElement('div');
                el.className = 'room-card' + (mine ? ' my-room' : '');
                if (mine || opponent) { el.onclick = function() { resumeRoom(r.id); }; el.style.cursor = 'pointer'; }
                var btnHtml = '';
                if (mine) {
                    btnHtml = r.status === 'playing' ? '<button class="room-btn join" onclick="event.stopPropagation();resumeRoom(\'' + r.id + '\')">🔄</button>' : '';
                    if (!r.opponent_tg_id && r.status !== 'playing') btnHtml += '<button class="room-btn cancel" onclick="event.stopPropagation();cancelRoom(\'' + r.id + '\')">✕</button>';
                } else if (r.status === 'waiting') {
                    btnHtml = '<button class="room-btn join" onclick="event.stopPropagation();joinRoom(\'' + r.id + '\',this)">Войти</button>';
                }
                el.innerHTML = '<div class="room-icon">' + (r.creator_username || '?').charAt(0).toUpperCase() + '</div><div class="room-info"><div class="room-stake">💰 ' + (r.stake || 0) + ' Spike</div><div class="room-creator">' + (mine ? 'Твоя комната' : '@' + (r.creator_username || '?')) + '</div></div><div class="room-actions">' + btnHtml + '</div>';
                c.appendChild(el);
            });
        }

        async function resumeRoom(roomId) {
            var room = await db('rooms', 'GET', null, '?id=eq.' + roomId, true);
            if (!room) return;
            currentRoom = room;
            showGameScreen();
        }

        async function cancelRoom(roomId) {
            await db('rooms', 'DELETE', null, '?id=eq.' + roomId);
            loadRooms();
        }

        async function joinRoom(roomId, btnElement) {
            if (isJoiningRoom) return;
            isJoiningRoom = true;
            if (btnElement) { btnElement.disabled = true; btnElement.textContent = '...'; }
            try {
                console.log('[JOIN] Room:', roomId, 'My ID:', MY_ID);
                var roomData = await db('rooms', 'GET', null, '?id=eq.' + roomId, false);
                if (!roomData || !roomData.length) throw new Error('Комната не найдена');
                var room = roomData[0];
                console.log('[JOIN] Room:', JSON.stringify(room));
                if (Number(room.creator_tg_id) === MY_ID) { isJoiningRoom = false; resumeRoom(roomId); return; }
                if (room.opponent_tg_id && Number(room.opponent_tg_id) === MY_ID) { isJoiningRoom = false; resumeRoom(roomId); return; }
                if (room.status !== 'waiting') throw new Error('Комната занята');
                if (room.opponent_tg_id) throw new Error('Уже есть соперник');
                
                var res = await db('rooms', 'PATCH', 
                    { opponent_tg_id: MY_ID, opponent_username: user.username || 'User', status: 'playing' },
                    '?id=eq.' + roomId + '&status=eq.waiting', true);
                console.log('[JOIN] Result:', JSON.stringify(res));
                if (!res) throw new Error('Не удалось присоединиться');
                currentRoom = res;
                showGameScreen();
            } catch(e) {
                console.error('[JOIN] Error:', e.message);
                alert('Ошибка: ' + e.message);
                if (btnElement) { btnElement.disabled = false; btnElement.textContent = 'Войти'; }
            } finally { isJoiningRoom = false; }
        }

        function showGameScreen() {
            document.getElementById('roomsScreen').classList.remove('open');
            document.getElementById('lobbyScreen').classList.add('hidden');
            document.getElementById('gameScreen').classList.remove('hidden');
            if (!currentRoom) return;
            document.getElementById('stakeAmount').textContent = (currentRoom.stake || 10) + ' Spike';
            var isCreator = String(currentRoom.creator_tg_id) === String(MY_ID);
            var myCol = isCreator ? 'creator_choice' : 'opponent_choice';
            var choices = document.querySelectorAll('.choice-btn');
            if (currentRoom[myCol]) {
                choices.forEach(function(b) { b.disabled = true; });
                document.getElementById('statusMessage').textContent = '✅ Ход записан';
            } else {
                choices.forEach(function(b) { b.disabled = false; });
                document.getElementById('statusMessage').textContent = 'Выберите ход';
            }
        }

        async function makeMove(choice) {
            if (!currentRoom) return;
            var col = String(currentRoom.creator_tg_id) === String(MY_ID) ? 'creator_choice' : 'opponent_choice';
            if (currentRoom[col]) return;
            document.querySelectorAll('.choice-btn').forEach(function(b) { b.disabled = true; });
            document.getElementById('statusMessage').textContent = '✅ Ход записан';
            await db('rooms', 'PATCH', { [col]: choice }, '?id=eq.' + currentRoom.id);
            currentRoom[col] = choice;
        }

        function openStakeModal() {
            document.getElementById('stakeModal').classList.remove('hidden');
        }

        function closeStakeModal(e) {
            if (!e || e.target.id === 'stakeModal' || e.target.className === 'skin-modal-close') {
                document.getElementById('stakeModal').classList.add('hidden');
            }
        }

        function selectStakePreset(value, btn) {
            selectedStake = value;
            document.querySelectorAll('.stake-preset-btn').forEach(function(b) { b.classList.remove('selected'); });
            if (btn) btn.classList.add('selected');
        }

        async function confirmStake() {
            if (isCreatingRoom) return;
            isCreatingRoom = true;
            try {
                var room = await db('rooms', 'POST', [{ creator_tg_id: MY_ID, creator_username: user.username || 'User', stake: selectedStake, status: 'waiting' }], '', true);
                currentRoom = room;
                document.getElementById('stakeModal').classList.add('hidden');
                showGameScreen();
                loadRooms();
            } catch(e) { alert('Ошибка: ' + e.message); }
            finally { isCreatingRoom = false; }
        }

        function showScreen(name) {
            document.getElementById('lobbyScreen').classList.add('hidden');
            document.getElementById('gameScreen').classList.add('hidden');
            if (name === 'lobby') {
                document.getElementById('lobbyScreen').classList.remove('hidden');
                currentRoom = null;
                loadRooms();
            }
        }

        function openRoomsScreen() { document.getElementById('roomsScreen').classList.add('open'); loadRooms(); }
        function closeRoomsScreen() { document.getElementById('roomsScreen').classList.remove('open'); }
        function setLanguage(lang) {}

        function startGame() {
            document.getElementById('splashScreen').classList.add('hidden');
            showScreen('lobby');
        }

        document.getElementById('startGameBtn').addEventListener('click', startGame);

        window.addEventListener('load', async function() {
            console.log('[INIT] Starting...');
            if (!getUserFromTelegram()) {
                console.error('[INIT] No Telegram user');
                return;
            }
            console.log('[INIT] User:', user.username, 'ID:', MY_ID);
            await ensureUser();
            document.getElementById('balanceSpike').textContent = currentBalance;
            loadRooms();
            console.log('[INIT] Done');
        });
    </script>
</body>
</html>
